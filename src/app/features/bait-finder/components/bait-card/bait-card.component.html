<article
  class="bait"
  [class.selected]="selected"
  role="button"
  tabindex="0"
  [attr.aria-pressed]="selected"
  [attr.aria-label]="'Show species for ' + bait.name"
  (click)="select()"
  (keydown.enter)="select()"
  (keydown.space)="select(); $event.preventDefault()"
>
  <div class="left">
    <div class="bait-media">
      <app-fallback-image
        [candidates]="bait.imageCandidates"
        [alt]="bait.name || 'bait'"
        variant="bait"
      />
    </div>
  </div>
  <div class="body">
    <div class="title-row">
      <h3 class="name">{{ bait.name }}</h3>
      <span class="tier rarity-pill" [ngClass]="bait.rarityClass">{{ bait.rarity }}</span>
    </div>
    <div class="meta">{{ bait.meta }}</div>
    @if (bait.desc) {
      <div class="effect">{{ bait.desc }}</div>
    }
    <div class="targets">
      <span class="target-label">Targets</span>
      <span>{{ (bait.targets || []).length ? (bait.targets || []).join(', ') : 'All species' }}</span>
    </div>
  </div>
</article>
